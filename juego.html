<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Survivor Game | Aidan Díaz</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f0f;
            --surface: #151a1a;
            --surface2: #1e2424;
            --accent: #00e6b8;
            --text: #dde5e5;
            --text2: #9aabab;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        .game-container {
            background: var(--surface);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid #2a3333;
            box-shadow: 0 0 40px rgba(0, 230, 184, 0.08);
            max-width: 750px;
            width: 100%;
        }

        /* Cabecera */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .game-header .title {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .game-header .title .icon {
            font-size: 1.5rem;
        }

        .game-header .title h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
        }

        .game-header .title h1 span {
            color: var(--accent);
        }

        .btn-back {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 0.5rem 1.2rem;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.3s;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .btn-back:hover {
            background: var(--accent);
            color: #000;
        }

        /* Canvas */
        .canvas-wrapper {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #2a3333;
            background: #c8d6d0;
            margin-bottom: 1rem;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            image-rendering: auto;
        }

        /* Controles */
        .controls-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem;
            padding: 0.5rem 0;
            color: var(--text2);
            font-size: 0.85rem;
        }

        .controls-bar .keys-group {
            display: flex;
            gap: 0.3rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .key-badge {
            background: var(--surface2);
            color: var(--accent);
            padding: 0.25rem 0.6rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.75rem;
            border: 1px solid #2a3333;
            min-width: 24px;
            text-align: center;
        }

        .key-badge.wide {
            min-width: 40px;
        }

        /* Joystick para móvil */
        .mobile-controls {
            display: none;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            margin-top: 0.8rem;
        }

        .joystick-base {
            width: 100px;
            height: 100px;
            background: var(--surface2);
            border-radius: 50%;
            border: 2px solid #2a3333;
            position: relative;
            touch-action: none;
        }

        .joystick-stick {
            width: 44px;
            height: 44px;
            background: var(--accent);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.7;
            box-shadow: 0 0 12px rgba(0, 230, 184, 0.3);
        }

        .btn-restart-mobile {
            display: none;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.5px;
            transition: all 0.3s;
        }

        .btn-restart-mobile:hover {
            background: #00c49a;
            transform: scale(1.03);
        }

        .btn-restart-mobile:active {
            transform: scale(0.97);
        }

        /* Instrucciones */
        .instructions {
            text-align: center;
            color: var(--text2);
            font-size: 0.8rem;
            margin-top: 0.8rem;
            opacity: 0.7;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .mobile-controls { display: flex; }
            .btn-restart-mobile { display: block; }
            .controls-bar .desktop-only { display: none; }
            .game-container { padding: 0.8rem; }
            .game-header .title h1 { font-size: 1.1rem; }
            .game-header .title .icon { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- Cabecera -->
        <div class="game-header">
            <div class="title">
                <span class="icon">🎮</span>
                <h1><span>Survivor</span> Game</h1>
            </div>
            <a href="index.html" class="btn-back">← Volver al portfolio</a>
        </div>

        <!-- Canvas del juego -->
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="600" height="400" aria-label="Survivor Game - Usa WASD o el joystick para moverte"></canvas>
        </div>

        <!-- Controles de teclado (escritorio) -->
        <div class="controls-bar">
            <span class="desktop-only">
                🖥️ 
                <span class="key-badge">W</span>
                <span class="key-badge">A</span>
                <span class="key-badge">S</span>
                <span class="key-badge">D</span>
                o flechas
            </span>
            <span>⚔️ La espada gira automáticamente</span>
            <span class="desktop-only">
                🔄 
                <span class="key-badge wide">R</span>
                para reiniciar
            </span>
        </div>

        <!-- Joystick para móvil -->
        <div class="mobile-controls">
            <div class="joystick-base" id="joystickBase">
                <div class="joystick-stick" id="joystickStick"></div>
            </div>
        </div>

        <!-- Botón de reinicio para móvil -->
        <button class="btn-restart-mobile" id="restartBtn">
            🔄 Reiniciar juego
        </button>

        <!-- Instrucciones móvil -->
        <p class="instructions mobile-only-text" style="display:none;">
            📱 Usa el joystick para moverte y sobrevive el mayor tiempo posible
        </p>
    </div>

    <script>
        // =============================================
        // SURVIVOR GAME
        // Desarrollado por Aidan Díaz Pérez
        // =============================================

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Detectar dispositivo móvil
        const isMobile = window.innerWidth <= 768;

        // Mostrar instrucciones en móvil
        if (isMobile) {
            document.querySelector('.mobile-only-text').style.display = 'block';
        }

        // Configuración según dispositivo
        const CONFIG = {
            swordRadius: isMobile ? 40 : 35,
            swordHitbox: isMobile ? 18 : 14
        };

        // ===== CARGAR IMÁGENES =====
        let playerImg = new Image();
        playerImg.src = "recursos/img/player.png";

        let enemyImg = new Image();
        enemyImg.src = "recursos/img/enemy.png";

        let swordImg = new Image();
        swordImg.src = "recursos/img/sword.png";

        // ===== ESTADO DEL JUEGO =====
        let keys = {};
        let angle = 0;
        let score = 0;
        let gameOver = false;

        // ===== JOYSTICK PARA MÓVIL =====
        const joystickBase = document.getElementById("joystickBase");
        const joystickStick = document.getElementById("joystickStick");

        let touchActive = false;
        let touchX = 0;
        let touchY = 0;

        if (isMobile && joystickBase) {
            joystickBase.addEventListener("touchstart", (e) => {
                e.preventDefault();
                touchActive = true;
            });

            joystickBase.addEventListener("touchmove", (e) => {
                e.preventDefault();

                const rect = joystickBase.getBoundingClientRect();
                const touch = e.touches[0];

                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;

                let dx = touch.clientX - centerX;
                let dy = touch.clientY - centerY;

                const maxDist = rect.width / 2;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > maxDist) {
                    dx = (dx / dist) * maxDist;
                    dy = (dy / dist) * maxDist;
                }

                joystickStick.style.transform = `translate(${dx}px, ${dy}px)`;

                touchX = dx / maxDist;
                touchY = dy / maxDist;
            });

            joystickBase.addEventListener("touchend", (e) => {
                e.preventDefault();
                touchActive = false;
                touchX = 0;
                touchY = 0;
                joystickStick.style.transform = `translate(0px, 0px)`;
            });
        }

        // ===== JUGADOR =====
        let player = {
            x: 200,
            y: 200,
            size: 32,
            speed: isMobile ? 2.5 : 2
        };

        // ===== ENEMIGOS =====
        let enemies = [];

        function spawnEnemy() {
            const margin = 50;
            const side = Math.floor(Math.random() * 4);

            let x, y;

            if (side === 0) {
                x = Math.random() * canvas.width;
                y = -margin;
            } else if (side === 1) {
                x = Math.random() * canvas.width;
                y = canvas.height + margin;
            } else if (side === 2) {
                x = -margin;
                y = Math.random() * canvas.height;
            } else {
                x = canvas.width + margin;
                y = Math.random() * canvas.height;
            }

            enemies.push({
                x,
                y,
                size: 24,
                speed: 1 + Math.random()
            });
        }

        // Spawnear enemigos cada 2 segundos
        setInterval(spawnEnemy, 2000);

        // ===== INPUT DE TECLADO =====
        document.addEventListener("keydown", (e) => {
            keys[e.key.toLowerCase()] = true;

            // Reiniciar con R si el juego terminó
            if (gameOver && e.key.toLowerCase() === "r") {
                resetGame();
            }
        });

        document.addEventListener("keyup", (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        // ===== ACTUALIZAR JUEGO =====
        function update() {
            if (gameOver) return;

            // Movimiento con teclado (escritorio)
            if (!isMobile) {
                if (keys["w"] || keys["arrowup"]) player.y -= player.speed;
                if (keys["s"] || keys["arrowdown"]) player.y += player.speed;
                if (keys["a"] || keys["arrowleft"]) player.x -= player.speed;
                if (keys["d"] || keys["arrowright"]) player.x += player.speed;
            }

            // Movimiento con joystick (móvil)
            if (isMobile && touchActive) {
                player.x += touchX * player.speed * 2;
                player.y += touchY * player.speed * 2;
            }

            // Limitar al canvas
            player.x = Math.max(0, Math.min(canvas.width - player.size, player.x));
            player.y = Math.max(0, Math.min(canvas.height - player.size, player.y));

            // Mover enemigos hacia el jugador
            enemies.forEach(enemy => {
                let dx = player.x - enemy.x;
                let dy = player.y - enemy.y;
                let dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > 0) {
                    enemy.x += (dx / dist) * enemy.speed;
                    enemy.y += (dy / dist) * enemy.speed;
                }
            });

            // Girar la espada
            angle += isMobile ? 0.25 : 0.2;

            // Comprobar colisiones
            checkCollisions();
            checkPlayerHit();
        }

        // ===== COLISIONES ESPADA - ENEMIGOS =====
        function checkCollisions() {
            const radius = CONFIG.swordRadius;

            let swordX = player.x + player.size / 2 + Math.cos(angle) * radius;
            let swordY = player.y + player.size / 2 + Math.sin(angle) * radius;

            enemies = enemies.filter(enemy => {
                let dx = enemy.x - swordX;
                let dy = enemy.y - swordY;
                let dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < (enemy.size / 2 + CONFIG.swordHitbox)) {
                    score++;
                    return false; // Eliminar enemigo
                }
                return true;
            });
        }

        // ===== COLISIONES JUGADOR - ENEMIGOS =====
        function checkPlayerHit() {
            enemies.forEach(enemy => {
                let dx = player.x - enemy.x;
                let dy = player.y - enemy.y;
                let dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < player.size / 2 + enemy.size / 2) {
                    gameOver = true;
                }
            });
        }

        // ===== REINICIAR JUEGO =====
        function resetGame() {
            gameOver = false;
            player.x = 200;
            player.y = 200;
            enemies = [];
            score = 0;
        }

        // ===== DIBUJAR =====
        function draw() {
            // Limpiar canvas con color de fondo claro (para que la espada negra se vea bien)
            ctx.fillStyle = "#c8d6d0";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Dibujar una cuadrícula sutil de fondo
            ctx.strokeStyle = "#b0bfb9";
            ctx.lineWidth = 0.5;
            const gridSize = 40;
            for (let x = 0; x < canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            // Dibujar jugador
            ctx.drawImage(playerImg, player.x, player.y, player.size, player.size);

            // Dibujar espada (girando alrededor del jugador)
            const radius = CONFIG.swordRadius;
            let sx = player.x + player.size / 2 + Math.cos(angle) * radius;
            let sy = player.y + player.size / 2 + Math.sin(angle) * radius;

            // Guardar contexto para rotar la espada
            ctx.save();
            ctx.translate(sx, sy);
            ctx.rotate(angle + Math.PI / 4); // Rotar para que apunte hacia afuera
            ctx.drawImage(swordImg, -8, -8, 16, 16);
            ctx.restore();

            // Dibujar enemigos (mirando hacia el jugador)
            enemies.forEach(enemy => {
                let dx = player.x - enemy.x;

                ctx.save();

                if (dx > 0) {
                    // Enemigo a la izquierda del jugador -> mirar hacia la derecha
                    ctx.translate(enemy.x + enemy.size, enemy.y);
                    ctx.scale(-1, 1);
                    ctx.drawImage(enemyImg, 0, 0, enemy.size, enemy.size);
                } else {
                    // Enemigo a la derecha -> mirar hacia la izquierda (por defecto)
                    ctx.drawImage(enemyImg, enemy.x, enemy.y, enemy.size, enemy.size);
                }

                ctx.restore();
            });

            // Puntuación con sombra para mejor visibilidad
            ctx.fillStyle = "rgba(0, 0, 0, 0.3)";
            ctx.font = "bold 16px 'Inter', Arial, sans-serif";
            ctx.textAlign = "left";
            ctx.fillText("⭐ " + score, 19, 31);
            
            ctx.fillStyle = "#1a1a1a";
            ctx.fillText("⭐ " + score, 18, 30);

            // Pantalla de Game Over
            if (gameOver) {
                // Fondo semitransparente
                ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Texto Game Over
                ctx.fillStyle = "#ff4444";
                ctx.font = "bold 40px 'Inter', Arial, sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 20);

                // Puntuación final
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 22px 'Inter', Arial, sans-serif";
                ctx.fillText("Puntuación: " + score, canvas.width / 2, canvas.height / 2 + 30);

                // Instrucción de reinicio
                ctx.fillStyle = "#00e6b8";
                ctx.font = "14px 'Inter', Arial, sans-serif";
                if (isMobile) {
                    ctx.fillText("Pulsa el botón para reiniciar", canvas.width / 2, canvas.height / 2 + 65);
                } else {
                    ctx.fillText("Pulsa R para reiniciar", canvas.width / 2, canvas.height / 2 + 65);
                }
            }
        }

        // ===== BUCLE DEL JUEGO =====
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // ===== BOTÓN DE REINICIO (MÓVIL) =====
        const restartBtn = document.getElementById("restartBtn");

        restartBtn.addEventListener("click", () => {
            resetGame();
        });

        restartBtn.addEventListener("touchstart", (e) => {
            e.preventDefault();
            resetGame();
        });

        // ===== INICIAR JUEGO =====
        gameLoop();
    </script>
</body>
</html>
